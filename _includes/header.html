<header class="site-header">
  <div class="container header-inner">

    <a href="#home" class="logo" aria-label="Sarah James Therapy home">
      <img
        src="{{ '/assets/images/brand/sarah-james-therapy-primary.svg' | relative_url }}"
        alt="Sarah James Therapy"
        class="logo-image"
      >
    </a>

    <button class="menu-button" type="button" aria-label="Open menu" aria-expanded="false">
      <span></span>
    </button>

    <nav class="main-nav" aria-label="Primary navigation">
      <a href="#about">About</a>
      <a href="#support">Support</a>
      <a href="#fees">Fees</a>

      <a
        href="mailto:hello@sarahjames-therapy.co.uk?subject=Therapy%20enquiry"
        class="nav-cta"
      >
        Email Sarah
      </a>
    </nav>

  </div>
</header>

<script>
  const menuButton = document.querySelector(".menu-button");
  const navLinks = document.querySelectorAll(".main-nav a");

  menuButton.addEventListener("click", () => {
    document.body.classList.toggle("menu-open");

    const isOpen = document.body.classList.contains("menu-open");
    menuButton.setAttribute("aria-expanded", isOpen);
    menuButton.setAttribute("aria-label", isOpen ? "Close menu" : "Open menu");
  });

  navLinks.forEach((link) => {
    link.addEventListener("click", () => {
      document.body.classList.remove("menu-open");
      menuButton.setAttribute("aria-expanded", "false");
      menuButton.setAttribute("aria-label", "Open menu");
    });
  });
</script>
