<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1, viewport-fit=cover"
/>

<title>
  {% if page.title %}
    {{ page.title }} | {{ site.title }}
  {% else %}
    {{ site.title }}
  {% endif %}
</title>

<meta
  name="description"
  content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}"
>

<meta
  name="theme-color"
  content="#f6f1ea"
>

<meta
  name="format-detection"
  content="telephone=no"
>

<link
  rel="preconnect"
  href="https://fonts.googleapis.com"
>

<link
  rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin
>

<link
  rel="stylesheet"
  href="/assets/css/main.css"
>

<link
  rel="icon"
  type="image/svg+xml"
  href="/assets/images/brand/sarah-james-icon.svg"
>

<link
  rel="apple-touch-icon"
  href="/assets/images/brand/sarah-james-icon.png"
>

<!-- Open Graph -->

<meta
  property="og:type"
  content="website"
>

<meta
  property="og:title"
  content="{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}"
>

<meta
  property="og:description"
  content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}"
>

<meta
  property="og:url"
  content="{{ page.url | absolute_url }}"
>

<meta
  property="og:site_name"
  content="{{ site.title }}"
>

<meta
  property="og:image"
  content="{{ '/assets/images/social-preview.jpg' | absolute_url }}"
>

<!-- Twitter -->

<meta
  name="twitter:card"
  content="summary_large_image"
>

<meta
  name="twitter:title"
  content="{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}"
>

<meta
  name="twitter:description"
  content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}"
>

<meta
  name="twitter:image"
  content="{{ '/assets/images/social-preview.jpg' | absolute_url }}"
>

<link
  rel="canonical"
  href="{{ page.url | absolute_url }}"
>
